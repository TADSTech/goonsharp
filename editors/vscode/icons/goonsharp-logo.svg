<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B30FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A0DAD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="shifted"/>
      <feFlood flood-color="#000000" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="shifted" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal shield background -->
  <polygon
    points="128,16 232,72 232,184 128,240 24,184 24,72"
    fill="url(#bgGrad)"
    filter="url(#shadow)"
    stroke="#7B1FA2"
    stroke-width="3"
  />

  <!-- Shine overlay on top half -->
  <polygon
    points="128,16 232,72 232,128 24,128 24,72"
    fill="url(#shineGrad)"
  />

  <!-- "G" letter -->
  <text
    x="128"
    y="128"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="140"
    fill="#FFFFFF"
    letter-spacing="-8"
    text-anchor="middle"
    dominant-baseline="middle"
  >G</text>

  <!-- "#" sharp symbol -->
  <text
    x="190"
    y="148"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="64"
    fill="#E1BEE7"
    opacity="0.95"
  >#</text>

  <!-- Small bottom accent bar -->
  <rect x="78" y="196" width="100" height="6" rx="3" fill="#E1BEE7" opacity="0.6"/>
</svg>
