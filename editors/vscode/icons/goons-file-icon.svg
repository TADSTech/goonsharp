<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- File icon for .goons files — light theme variant -->

  <!-- File body -->
  <path d="M6,2 L20,2 L26,8 L26,30 L6,30 Z" fill="#F3E5F9" stroke="#7B1FA2" stroke-width="1" stroke-linejoin="round"/>

  <!-- Folded corner -->
  <path d="M20,2 L20,8 L26,8 Z" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" stroke-linejoin="round"/>

  <!-- Purple badge background at bottom -->
  <rect x="4" y="19" width="24" height="12" rx="2" fill="#7B1FA2"/>

  <!-- ".goons" text on badge -->
  <text
    x="16"
    y="28.5"
    font-family="'Consolas', 'Courier New', monospace"
    font-weight="700"
    font-size="5"
    fill="#FFFFFF"
    text-anchor="middle"
  >.goons</text>

  <!-- Small G# monogram on file body -->
  <text
    x="16"
    y="16"
    font-family="'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="9"
    fill="#9C27B0"
    text-anchor="middle"
  >G#</text>
</svg>
