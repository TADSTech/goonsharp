<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B44AFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9B30FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A0DAD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="60%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#9B30FF" stroke-width="2" opacity="0.3" filter="url(#glow)"/>

  <!-- Main hexagonal shield -->
  <polygon
    points="256,32 464,144 464,368 256,480 48,368 48,144"
    fill="url(#bgGrad)"
    filter="url(#shadow)"
    stroke="#9C27B0"
    stroke-width="4"
  />

  <!-- Shine overlay -->
  <polygon
    points="256,32 464,144 464,256 48,256 48,144"
    fill="url(#shineGrad)"
  />

  <!-- Inner border accent -->
  <polygon
    points="256,52 446,156 446,356 256,460 66,356 66,156"
    fill="none"
    stroke="#E1BEE7"
    stroke-width="1.5"
    opacity="0.2"
  />

  <!-- "G" letter — main character -->
  <text
    x="256"
    y="256"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="280"
    fill="#FFFFFF"
    letter-spacing="-15"
    text-anchor="middle"
    dominant-baseline="middle"
  >G</text>

  <!-- "#" sharp symbol -->
  <text
    x="380"
    y="296"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="128"
    fill="#E1BEE7"
    opacity="0.9"
  >#</text>

  <!-- Bottom accent bar -->
  <rect x="156" y="392" width="200" height="8" rx="4" fill="#E1BEE7" opacity="0.5"/>

  <!-- Decorative corner dots -->
  <circle cx="256" cy="50" r="5" fill="#E1BEE7" opacity="0.4"/>
  <circle cx="256" cy="462" r="5" fill="#E1BEE7" opacity="0.4"/>
  <circle cx="60" cy="256" r="5" fill="#E1BEE7" opacity="0.4"/>
  <circle cx="452" cy="256" r="5" fill="#E1BEE7" opacity="0.4"/>
</svg>
